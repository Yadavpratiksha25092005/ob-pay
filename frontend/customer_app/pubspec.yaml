name: customer_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.1
  go_router: ^17.3.0
  mobile_scanner: ^7.2.0
  fl_chart: ^1.2.0
  animate_do: ^5.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  local_auth: ^3.0.1
  image_picker: ^1.2.2
  url_launcher: ^6.3.1
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/ob_pay_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ob_pay_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F8FAFC"
  adaptive_icon_foreground: "assets/images/ob_pay_logo.png"